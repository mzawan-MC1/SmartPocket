name: Deploy Smart Pocket Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: smartpocket-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy Smart Pocket
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -i ~/.ssh/id_ed25519 \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "cd /var/www/smartpocket && git fetch origin main && git reset --hard origin/main && bash scripts/deploy-production.sh"
